<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262b3b"/>
      <stop offset="1" stop-color="#12151f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ee0a6"/>
      <stop offset="1" stop-color="#2bb6f0"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- body -->
  <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#gloss)"/>
  <rect x="41.5" y="41.5" width="429" height="429" rx="102.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>

  <!-- top window dots -->
  <g>
    <circle cx="150" cy="138" r="13" fill="#ff5f57"/>
    <circle cx="196" cy="138" r="13" fill="#febc2e"/>
    <circle cx="242" cy="138" r="13" fill="#28c840"/>
  </g>

  <!-- prompt: chevron + cursor (accent glow) -->
  <g filter="url(#soft)" opacity="0.55">
    <path d="M168 232 L236 286 L168 340" fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="262" y="318" width="92" height="26" rx="13" fill="url(#accent)"/>
  </g>
  <path d="M168 232 L236 286 L168 340" fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="262" y="318" width="92" height="26" rx="13" fill="url(#accent)"/>

  <!-- drop-down chevron motif -->
  <path d="M222 392 L256 420 L290 392" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
