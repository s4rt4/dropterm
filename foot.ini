# Config khusus drop-terminal (dipakai lewat: foot --config=<path>)

# Jalankan shell lewat perekam PTY: SEMUA output terminal ditulis ke disk
# (~/.local/share/drop-terminal/scrollback.log) supaya scrollback bertahan walau
# reboot / ganti kernel. Saat terminal dibuka lagi, ekor riwayat lama tampil di
# atas prompt baru. Lihat dropterm-shell.py.
shell=/home/sarta/.local/share/gnome-shell/extensions/drop-terminal@sarta.local/dropterm-shell.py

# Ukuran teks. Naikkan/turunkan angka size sesuai selera.
font=monospace:size=12

# Padding biar teks nggak nempel ke pinggir.
pad=8x6

# Seleksi mouse otomatis nyalin ke primary + clipboard sekaligus,
# jadi Ctrl+Shift+V dan paste klik-kanan dapet teks yang sama.
selection-target=both

# Skema warna aktif. File ini ditulis & diganti lewat menu "Tema warna" di
# panel (klik kanan ikon terminal). foot cuma baca include= ini saat startup
# (SIGUSR1 TIDAK re-read file), jadi extension me-restart foot saat ganti tema.
include=~/.config/drop-terminal/theme.ini

[scrollback]
lines=10000

[mouse]
hide-when-typing=yes

[mouse-bindings]
# foot sudah mengikat BTN_RIGHT ke 'select-extend' dan BTN_LEFT-3 (triple-click)
# ke 'select-quote' secara default. Harus dibebaskan dulu (=none), kalau tidak
# foot menolak binding kita: "BTN_RIGHT already mapped to 'select-extend'".
select-extend=none
select-quote=none

# Klik kiri drag = seleksi (otomatis copy karena selection-target=both).
# Klik KANAN = paste. (default foot: paste itu klik-tengah)
primary-paste=BTN_RIGHT
select-begin=BTN_LEFT
select-word=BTN_LEFT-2
select-row=BTN_LEFT-3

[key-bindings]
# Tambahan: Ctrl+Shift+C / Ctrl+Shift+V tetap jalan (default foot).
